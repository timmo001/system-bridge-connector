---
name: "Lint"

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint-jsonlint:
    # master
    # yamllint disable-line rule:line-length
    uses: timmo001/workflows/.github/workflows/lint-jsonlint.yml@635f5727c8686b952f53d2fbe1d2e80d2480c831
  lint-markdown-links:
    # master
    # yamllint disable-line rule:line-length
    uses: timmo001/workflows/.github/workflows/lint-markdown-links.yml@635f5727c8686b952f53d2fbe1d2e80d2480c831
  lint-markdownlint:
    name: 👕 MarkdownLint
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ github.head_ref }}
      - name: 🚀 Run mdl
        # yamllint disable-line rule:line-length
        uses: actionshub/markdownlint@6c82ff529253530dfbf75c37570876c52692835f # main
        with:
          filesToIgnoreRegex: "AGENTS\\.md"
  lint-pylint:
    name: Lint (pylint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt -r requirements_test.txt
          pip install "pylint>=3.2"
      - name: Run pylint (uses pyproject.toml)
        run: |
          pylint --rcfile=pyproject.toml systembridgeconnector
  lint-ruff:
    # master
    # yamllint disable-line rule:line-length
    uses: timmo001/workflows/.github/workflows/lint-ruff.yml@635f5727c8686b952f53d2fbe1d2e80d2480c831
