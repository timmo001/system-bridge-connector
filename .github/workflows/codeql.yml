---
name: "CodeQL"

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: "0 12 * * 4"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql-analyze-python:
    # master
    # yamllint disable-line rule:line-length
    uses: timmo001/workflows/.github/workflows/codeql-python.yml@635f5727c8686b952f53d2fbe1d2e80d2480c831
