---
name: "Deploy"

# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    if: ${{ !github.event.release.draft && !github.event.release.prerelease }}
    # master
    # yamllint disable-line rule:line-length
    uses: timmo001/workflows/.github/workflows/build-python-pypi-release.yml@635f5727c8686b952f53d2fbe1d2e80d2480c831
    with:
      package-name: "systembridgeconnector"

  publish:
    name: Publish distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download validated distributions
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist/
      - name: Publish distributions to PyPI
        # release/v1
        # yamllint disable-line rule:line-length
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247
