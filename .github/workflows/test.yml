---
name: "Test"

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # master
    # yamllint disable-line rule:line-length
    uses: timmo001/workflows/.github/workflows/test-pytest.yml@635f5727c8686b952f53d2fbe1d2e80d2480c831
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    with:
      module-name: "systembridgeconnector"
